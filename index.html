<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Finder - Guided by Luffy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="theme-selector">
        <button id="theme-btn" class="theme-main-btn">THEMES</button>
        <div id="theme-options" class="theme-options hidden">
            <button onclick="changeTheme('default')">NORMAL</button>
            <button onclick="changeTheme('dark')">DARK</button>
            <button onclick="changeTheme('simple')">SIMPLE</button>
        </div>
    </div>

    <div class="anime-selector" id="anime-selector">
        <button id="anime-btn" class="anime-main-btn">ANIME MODE</button>
    </div>

    <div id="overlay" class="overlay"></div>

    <div id="character-container" class="character-container">
        <img id="character-img" src="images/welcome.png" alt="Character">
    </div>

    <div id="dialogue-box" class="dialogue-box">
        <p id="dialogue-text"></p>
        <div id="dialogue-options" class="dialogue-options"></div>
        <button id="continue-btn" class="continue-btn hidden">CONTINUE →</button>
    </div>

    <div id="question-screen" class="question-screen hidden">
        <div class="type-selector">
            <input type="text" id="search-bar" placeholder="Search or choose below...">
            <div id="search-results" class="search-results hidden"></div>
            <div class="type-buttons">
                <button onclick="selectType('movie')">MOVIE</button>
                <button onclick="selectType('season')">SEASON</button>
            </div>
        </div>

        <div id="questions-container" class="questions-container hidden">
            <div class="question" id="q1">
                <h3 id="q1-text"></h3>
                <div id="q1-options" class="options"></div>
            </div>
            <div class="question" id="q2">
                <h3 id="q2-text"></h3>
                <div id="q2-options" class="options"></div>
            </div>
            <div class="question" id="q3">
                <h3 id="q3-text"></h3>
                <div id="q3-options" class="options"></div>
            </div>
            <button id="submit-btn" class="submit-btn hidden">GET RECOMMENDATION</button>
        </div>
    </div>

    <div id="thinking-screen" class="thinking-screen hidden">
        <img src="images/thinking.png" alt="Luffy Thinking">
        <h2>LUFFY IS THINKING...</h2>
    </div>

    <div id="result-screen" class="result-screen hidden">
        <h2 id="result-title"></h2>
        <p id="result-description"></p>

        <div id="feedback-buttons" class="feedback-buttons hidden">
            <button onclick="handleFeedback(true)" class="yes-btn">YES, I LIKE IT!</button>
            <button onclick="handleFeedback(false)" class="no-btn">NO, KEEP LOOKING</button>
        </div>

        <button id="restart-btn" onclick="restart()" class="hidden">START OVER</button>
    </div>

    <div id="final-screen" class="final-screen hidden">
        <h2>ENJOY YOUR WATCH! </h2>
        <button onclick="restart()">FIND ANOTHER</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
